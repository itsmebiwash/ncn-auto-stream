<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Automated Infotainment Engine Canvas</title>
    <!-- Google Fonts import for premium typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@1,700&display=swap"
        rel="stylesheet">

    <style>
        /* =========================================================================
           🌐 CORE CANVAS RESET & BASE STYLES (Fixed 1080x1350 Meta Post Box)
           ========================================================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .master-canvas {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            background-color: #0b0202;
            display: flex;
            flex-direction: column;
        }

        /* Background image container across all versions */
        .bg-scraped-photo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('{IMAGE_URL}') center center / cover no-repeat;
            z-index: 1;
        }

        /* Branding element logo placement */
        .brand-logo-container {
            position: absolute;
            z-index: 10;
            width: 130px;
        }

        .brand-logo-container img {
            width: 100%;
            height: auto;
        }

        /* Decorative Vector Elements from image_54c4a2.jpg */
        .dot-matrix {
            position: absolute;
            width: 120px;
            height: 120px;
            background-image: radial-gradient(rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px);
            background-size: 12px 12px;
            z-index: 5;
        }

        .wavy-accent-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 4;
            pointer-events: none;
            opacity: 0.7;
        }

        /* Default highlight styling */
        .text-highlight {
            color: #ffcc00;
            font-weight: 900;
        }

        /* =========================================================================
           📰 MODEL 1: HARD NEWS & POLITICS (Inspired Exactly by image_54c4a2.jpg)
           ========================================================================= */
        .layout-news .brand-logo-container {
            top: 70px;
            left: 65px;
        }

        .layout-news .dot-matrix-top {
            top: 60px;
            right: 60px;
        }

        .layout-news .dot-matrix-bottom {
            bottom: 400px;
            right: 40px;
        }

        /* Dense bottom heavy dark crimson layout mask block */
        .layout-news .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65%;
            background: linear-gradient(to bottom, rgba(88, 3, 3, 0) 0%, rgba(88, 3, 3, 0.75) 30%, #580303 75%, #3a0202 100%);
            z-index: 3;
        }

        .layout-news .content-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 0 65px 80px 65px;
            z-index: 6;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* Red rectangular header flag badge */
        .layout-news .category-badge {
            display: inline-block;
            background-color: #c90909;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 1px;
            padding: 10px 24px;
            text-transform: uppercase;
            margin-bottom: 35px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }

        /* Huge bold uppercase dynamic news headline block */
        .layout-news .headline-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 64px;
            line-height: 1.15;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            margin-bottom: 30px;
            text-shadow: 2px 4px 12px rgba(0, 0, 0, 0.4);
        }

        .layout-news .body-description {
            font-size: 30px;
            line-height: 1.6;
            color: #e2e8f0;
            font-weight: 400;
            margin-bottom: 50px;
            max-width: 90%;
        }

        .layout-news .footer-meta {
            display: flex;
            justify-content: flex-end;
            font-size: 24px;
            color: #ffffff;
            font-weight: 700;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 25px;
        }

        /* =========================================================================
           ⚡ MODEL 2: FUTURISTIC TECHNOLOGY (Asymmetric Tech Grid Layout)
           ========================================================================= */
        .layout-tech .brand-logo-container {
            top: 60px;
            right: 60px;
        }

        .layout-tech .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(10, 25, 47, 0.2) 0%, rgba(2, 12, 27, 0.95) 85%);
            z-index: 3;
        }

        .layout-tech .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 120px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 6;
            color: #64ffda;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Cyberpunk styled bracket badge */
        .layout-tech .category-badge {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #64ffda;
            border-left: 4px solid #64ffda;
            padding-left: 15px;
        }

        .layout-tech .headline-title {
            color: #e2e8f0;
            font-size: 58px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(100, 255, 218, 0.2);
            padding-bottom: 40px;
        }

        .layout-tech .body-description {
            color: #8892b0;
            font-size: 32px;
            line-height: 1.7;
            font-weight: 500;
        }

        .layout-tech .text-highlight {
            color: #64ffda;
            text-shadow: 0 0 10px rgba(100, 255, 218, 0.3);
        }

        .layout-tech .footer-meta {
            position: absolute;
            bottom: 60px;
            left: 80px;
            font-size: 22px;
            color: #64ffda;
        }

        /* =========================================================================
           📊 MODEL 3: MARKET SHARE & FINANCIALS (Infographic Split Dashboard)
           ========================================================================= */
        .layout-market .brand-logo-container {
            top: 50px;
            left: 50px;
        }

        /* 50/50 horizontal split framework model */
        .layout-market .bg-scraped-photo {
            height: 45%;
            top: 0;
        }

        .layout-market .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background-color: #111827;
            z-index: 3;
            border-top: 6px solid #10b981;
        }

        .layout-market .content-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            padding: 60px 60px 50px 60px;
            z-index: 6;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .layout-market .category-badge {
            background-color: #10b981;
            color: #111827;
            font-size: 20px;
            font-weight: 900;
            padding: 6px 16px;
            border-radius: 4px;
            align-self: flex-start;
            text-transform: uppercase;
        }

        .layout-market .headline-title {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.3;
            color: #f3f4f6;
        }

        /* Structured modular summary display container box */
        .layout-market .market-data-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
        }

        .layout-market .body-description {
            font-size: 26px;
            line-height: 1.6;
            color: #9ca3af;
        }

        .layout-market .text-highlight {
            color: #10b981;
        }

        .layout-market .footer-meta {
            font-size: 22px;
            color: #6b7280;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        /* =========================================================================
           🌱 MODEL 4: HEALTH & LIFESTYLE (Elegant Humanist Clean Minimalist)
           ========================================================================= */
        .layout-health .brand-logo-container {
            bottom: 70px;
            left: 70px;
        }

        /* Floating nested image window panel overlay layout */
        .layout-health .bg-scraped-photo {
            width: 86%;
            height: 50%;
            top: 70px;
            left: 70px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .layout-health .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f7f4f0;
            /* Calm off-white canvas base */
            z-index: 2;
        }

        .layout-health .content-wrapper {
            position: absolute;
            bottom: 160px;
            left: 70px;
            right: 70px;
            z-index: 6;
            color: #2d3748;
            font-family: 'Inter', sans-serif;
        }

        .layout-health .category-badge {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 28px;
            color: #4a5568;
            margin-bottom: 20px;
            display: block;
        }

        .layout-health .headline-title {
            font-size: 52px;
            font-weight: 800;
            line-height: 1.3;
            color: #1a202c;
            letter-spacing: -0.5px;
            margin-bottom: 25px;
        }

        .layout-health .body-description {
            font-size: 28px;
            line-height: 1.6;
            color: #4a5568;
        }

        .layout-health .text-highlight {
            color: #319795;
            background: rgba(49, 151, 149, 0.08);
            padding: 2px 10px;
            border-radius: 6px;
        }

        .layout-health .footer-meta {
            position: absolute;
            bottom: 70px;
            right: 70px;
            font-size: 22px;
            color: #718096;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <!-- 
      🚀 PYTHON INTERACTIVE SWITCH DIRECTIONS:
      To execute different layouts dynamically based on your content category types, 
      replace the active layout class name inside the main class token block below:
      
      Options:
      1. Hard News / Politics: class="master-canvas layout-news" 
      2. Tech / Gadget Trends: class="master-canvas layout-tech"
      3. Business / Finance:   class="master-canvas layout-market"
      4. Health / Wellness:    class="master-canvas layout-health"
    -->

    <div class="master-canvas layout-news">

        <!-- Scraped background image instance layer -->
        <div class="bg-scraped-photo"></div>

        <!-- Dynamic Category Layout Background Mask Layer -->
        <div class="gradient-overlay"></div>

        <!-- Corner Dot Grids explicitly drawn for image_54c4a2.jpg style -->
        <div class="dot-matrix dot-matrix-top"></div>
        <div class="dot-matrix dot-matrix-bottom"></div>

        <!-- Decorative Vector Wave Layout overlay line from reference picture -->
        <svg class="wavy-accent-line" viewBox="0 0 1080 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,150 C300,280 700,50 1080,180 L1080,300 L0,300 Z" fill="rgba(255,255,255,0.03)" />
            <path d="M0,160 Q450,80 1080,210" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none" />
        </svg>

        <!-- Dynamic Brand Identity Logo placement block -->
        <div class="brand-logo-container">
            <!-- Ensure your python code checks if local file assets/logo.png exists -->
            <img src="../../assets/logo.png" alt="Logo Template Placeholder">
        </div>

        <!-- Structural Context Layer Container -->
        <div class="content-wrapper">

            <!-- Category Alert Box Label Tag -->
            <div class="category-badge">{CATEGORY_BADGE}</div>

            <!-- Main Content Headline Box -->
            <div class="headline-title">{HEADLINE_TITLE}</div>

            <!-- Body Content Box Wrapper -->
            <!-- Note: Remember to replace your {HIGHLIGHT_WORD} via python string formatting with <span class="text-highlight">word</span> tags -->
            <div class="market-data-card-conditional-wrapper">
                <div class="body-description">{BODY_DESCRIPTION}</div>
            </div>

            <!-- Brand Handles / Web URL Call-out Footer metadata from image_54c4a2.jpg -->
            <div class="footer-meta">
                <span class="url-text">www.yourchannel.com</span>
            </div>

        </div>
    </div>

</body>

</html>
