name: Automated News Scraper & Facebook Poster

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    concurrency:
      group: news-scraper-singleton
      cancel-in-progress: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-noto-color-emoji

      - name: Install Python Dependencies
        run: |
          pip install requests beautifulsoup4 html2image lxml

      - name: Verify Secrets
        run: |
          echo "GROQ_API_KEYS: $(echo '${{ secrets.GROQ_API_KEYS }}' | wc -c) chars"
          echo "FB_PAGE_ID: $(echo '${{ secrets.FB_PAGE_ID }}' | wc -c) chars"
          echo "FB_PAGE_ACCESS_TOKEN: $(echo '${{ secrets.FB_PAGE_ACCESS_TOKEN }}' | wc -c) chars"
          echo "PEXELS_API_KEY: $(echo '${{ secrets.PEXELS_API_KEY }}' | wc -c) chars"

      - name: Run Multi-Content Engine
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS:      ${{ secrets.GEMINI_API_KEYS }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEYS:        ${{ secrets.GROQ_API_KEYS }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
        run: |
          python main.py

      - name: Commit Updated History Back to Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped_history.json || true
          git diff --cached --quiet || git commit -m "chore: update post history [skip ci]"
          git push || true
