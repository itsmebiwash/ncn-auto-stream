name: Automated News Scraper & Facebook Poster

on:
  schedule:
    # Runs 3 times during Nepal night (10PM, 1AM, 4AM NPT = 16:15, 19:15, 22:15 UTC)
    # ONLY runs if phone/laptop has been offline for 25+ min (heartbeat check inside run_sync.py)
    - cron: '15 16 * * *'   # 10:00 PM Nepal Time
    - cron: '15 19 * * *'   # 01:00 AM Nepal Time
    - cron: '15 22 * * *'   # 04:00 AM Nepal Time
  workflow_dispatch:        # Manual trigger still works anytime

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    concurrency:
      group: news-scraper-singleton
      cancel-in-progress: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-noto-color-emoji

      - name: Install Python Dependencies
        run: |
          pip install requests beautifulsoup4 html2image lxml

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run NCN Universal Sync Wrapper
        env:
          GITHUB_ACTIONS:       "true"
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS:      ${{ secrets.GEMINI_API_KEYS }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEYS:        ${{ secrets.GROQ_API_KEYS }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          FOOTBALL_API_KEY:     ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          python run_sync.py
