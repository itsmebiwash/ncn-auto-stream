name: News Scraper & Publisher (Every 30 min)

on:
  schedule:
    - cron: '0 * * * *'   # top of every hour
    - cron: '30 * * * *'  # half-past every hour → effectively every 30 minutes
  workflow_dispatch:       # manual trigger

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 28   # must finish within 28 min so the next 30-min run can start

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline (Batch Mode)
        env:
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          GROQ_KEYS: ${{ secrets.GROQ_API_KEYS }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
          GITHUB_ACTIONS: "true"
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          echo "[GH Actions] Starting batch pipeline run at $(date)"
          python run_pipeline.py --batch-mode
          echo "[GH Actions] Pipeline finished at $(date)"
