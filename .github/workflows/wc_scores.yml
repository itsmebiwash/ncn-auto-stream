name: WC 2026 Live Score Poster

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wc-score-bot:
    runs-on: ubuntu-latest
    concurrency:
      group: wc-score-singleton
      cancel-in-progress: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-noto-color-emoji

      - name: Install Python Dependencies
        run: |
          pip install requests html2image

      - name: Run WC Score Bot
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          python wc_scores.py

      - name: Save Score History to Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wc_posted_history.json || true
          git diff --cached --quiet || git commit -m "chore: update wc score history [skip ci]"
          git push || true
