<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sports Vertical News Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html,
        body {
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            background: #0a0d08;
        }

        .card {
            position: relative;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            background-image: url('{IMAGE_URL}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #10140c;
            display: flex;
            flex-direction: column;
        }

        /* Gradient overlay: dark bottom ~58%, light top for badge/logo legibility */
        .overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom,
                    rgba(6, 8, 5, 0.30) 0%,
                    rgba(6, 8, 5, 0.02) 24%,
                    rgba(8, 11, 6, 0.55) 44%,
                    rgba(5, 7, 4, 0.90) 66%,
                    rgba(3, 4, 2, 0.98) 100%);
            z-index: 1;
        }

        /* Sports vibe: Electric Orange / Deep Green / Charcoal, high-energy action */
        .accent-glow {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 88% 8%, rgba(249, 115, 22, 0.36) 0%, rgba(249, 115, 22, 0) 42%),
                radial-gradient(circle at 4% 96%, rgba(21, 128, 61, 0.34) 0%, rgba(21, 128, 61, 0) 50%);
            z-index: 2;
            mix-blend-mode: screen;
        }

        /* Diagonal action stripe for dynamic sports feel */
        .stripe-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #f97316 0%, #15803d 100%);
            z-index: 6;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 52px 56px 0 56px;
        }

        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            background: linear-gradient(135deg, #f97316 0%, #c2410c 100%);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 12px 28px;
            border-radius: 999px;
            box-shadow: 0 8px 24px rgba(249, 115, 22, 0.45);
        }

        .category-badge::before {
            content: "";
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #ffffff;
            display: inline-block;
        }

        .brand img {
            height: 48px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
        }

        /* ===== SPACER pushes content box to bottom ===== */
        .spacer {
            flex: 1 1 auto;
        }

        /* ===== ADAPTIVE CONTENT BOX ===== */
        .content-box {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 48px 56px 44px 56px;
        }

        .headline {
            color: #ffffff;
            font-family: 'Montserrat', 'Archivo Black', sans-serif;
            font-size: 52px;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.55);

            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .description {
            color: #ffffff;
            opacity: 0.88;
            font-family: 'Inter', 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 500;
            line-height: 1.45;

            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ===== FOOTER BAR ===== */
        .footer-bar {
            position: relative;
            z-index: 6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 26px 56px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0.15) 100%);
            border-top: 1px solid rgba(249, 115, 22, 0.25);
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .source-text {
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .dot-sep {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
        }

        .date-text {
            color: rgba(255, 255, 255, 0.65);
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 500;
        }

        .hashtag-bar {
            color: #fdba74;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="overlay"></div>
        <div class="accent-glow"></div>
        <div class="stripe-top"></div>

        <div class="top-bar">
            <div class="category-badge">{CATEGORY_BADGE}</div>
            <div class="brand">
                <img src="{BRAND_LOGO_URL}" alt="brand logo">
            </div>
        </div>

        <div class="spacer"></div>

        <div class="content-box">
            <div class="headline">{HEADLINE_TITLE}</div>
            <div class="description">{BODY_DESCRIPTION}</div>
        </div>

        <div class="footer-bar">
            <div class="footer-left">
                <span class="source-text">{SOURCE_TEXT}</span>
                <span class="dot-sep"></span>
                <span class="date-text">{DATE_TEXT}</span>
            </div>
            <div class="hashtag-bar">#NCN</div>
        </div>
    </div>

</body>

</html>
