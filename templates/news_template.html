<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NCN Template</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@1,700&display=swap"
        rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        .master-canvas {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            background-color: #0b0202;
            display: flex;
            flex-direction: column;
        }

        .bg-scraped-photo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('{IMAGE_URL}') center center / cover no-repeat;
            z-index: 1;
        }

        .brand-logo-container {
            position: absolute;
            z-index: 20;
            width: 120px;
        }
        .brand-logo-container img { width: 100%; height: auto; }

        /* ── SHARED GLASS LOGO PILL ── */
        .logo-glass-pill {
            position: absolute;
            z-index: 20;
            top: 55px; left: 55px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 18px;
            padding: 10px 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .logo-glass-pill img { height: 62px; width: auto; display: block; }

        /* Decorative dot grid */
        .dot-matrix {
            position: absolute;
            width: 120px; height: 120px;
            background-image: radial-gradient(rgba(255,255,255,0.2) 1.5px, transparent 1.5px);
            background-size: 12px 12px;
            z-index: 5;
        }

        /* Wavy accent line */
        .wavy-accent-line {
            position: absolute; bottom: 0; left: 0;
            width: 100%; z-index: 4;
            pointer-events: none; opacity: 0.5;
        }

        /* ================================================================
           LAYOUT-NEWS  |  Politics & General
           Huge full-bleed photo, deep crimson fade at bottom,
           Glass card hovers over photo with bold editorial typography.
           ================================================================ */
        .layout-news .bg-scraped-photo { height: 65%; }

        .layout-news .gradient-overlay {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 72%;
            background: linear-gradient(to bottom,
                rgba(42,2,2,0) 0%,
                rgba(60,3,3,0.7) 25%,
                #3a0101 60%,
                #220000 100%);
            z-index: 3;
        }

        .layout-news .dot-matrix-top  { top: 55px; right: 55px; }
        .layout-news .dot-matrix-bottom { bottom: 420px; right: 42px; }

        .layout-news .glass-content-card {
            position: absolute;
            bottom: 55px; left: 55px; right: 55px;
            background: rgba(20, 2, 2, 0.55);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.12);
            border-top: 1.5px solid rgba(255,80,80,0.35);
            border-radius: 28px;
            padding: 48px 52px 42px;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
        }

        .layout-news .category-badge {
            display: inline-block;
            background: #c90909;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 2px;
            padding: 9px 24px;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 28px;
            box-shadow: 0 4px 18px rgba(201,9,9,0.5);
        }

        .layout-news .headline-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 58px;
            line-height: 1.15;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #fff;
            margin-bottom: 26px;
            text-shadow: 2px 4px 14px rgba(0,0,0,0.5);
        }

        .layout-news .body-description {
            font-family: 'Inter', sans-serif;
            font-size: 26px;
            line-height: 1.65;
            color: #e2caca;
            margin-bottom: 36px;
        }

        .layout-news .footer-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.12);
            padding-top: 22px;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
        }
        .layout-news .footer-meta span { color: #c90909; }


        /* ================================================================
           LAYOUT-TECH  |  Technology & Gadgets
           Dark radial vignette, neon cyan accents,
           Left-bordered badge + frosted glass panel on right side.
           ================================================================ */
        .layout-tech .gradient-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 15%, rgba(5,15,30,0.15) 0%, rgba(2,8,20,0.92) 80%);
            z-index: 3;
        }

        /* Glass panel sits on left, image peeks through right side */
        .layout-tech .glass-content-card {
            position: absolute;
            top: 50%; left: 55px;
            transform: translateY(-50%);
            width: 60%;
            background: rgba(0, 15, 35, 0.55);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(100,255,218,0.18);
            border-left: 3px solid #64ffda;
            border-radius: 0 24px 24px 0;
            padding: 52px 48px 48px 52px;
            z-index: 10;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(100,255,218,0.06);
        }

        .layout-tech .logo-glass-pill {
            top: auto;
            bottom: 55px; left: 55px;
        }

        .layout-tech .category-badge {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #64ffda;
            border-left: 4px solid #64ffda;
            padding-left: 14px;
            margin-bottom: 24px;
            display: block;
        }

        .layout-tech .headline-title {
            font-family: 'Space Grotesk', sans-serif;
            color: #e2f0ff;
            font-size: 52px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(100,255,218,0.2);
            padding-bottom: 28px;
        }

        .layout-tech .body-description {
            font-family: 'Space Grotesk', sans-serif;
            color: #8892b0;
            font-size: 26px;
            line-height: 1.7;
            font-weight: 500;
            margin-bottom: 34px;
        }

        .layout-tech .footer-meta {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #64ffda;
            opacity: 0.6;
        }


        /* ================================================================
           LAYOUT-MARKET  |  Business & Finance
           Top half is full photo, bottom half is deep dark glass panel
           with green accent border — infographic dashboard feel.
           ================================================================ */
        .layout-market .bg-scraped-photo { height: 48%; top: 0; }

        .layout-market .gradient-overlay {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 55%;
            background: rgba(8, 16, 30, 0.92);
            backdrop-filter: blur(0px);
            z-index: 3;
            border-top: 5px solid #10b981;
        }

        .layout-market .glass-content-card {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 55%;
            background: rgba(8, 18, 32, 0.65);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-top: 2px solid rgba(16,185,129,0.4);
            padding: 52px 65px 45px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .layout-market .logo-glass-pill { top: 42px; left: 50px; }

        .layout-market .category-badge {
            display: inline-block;
            background: #10b981;
            color: #071a12;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 900;
            padding: 7px 18px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0;
            align-self: flex-start;
            box-shadow: 0 4px 14px rgba(16,185,129,0.45);
        }

        .layout-market .headline-title {
            font-family: 'Inter', sans-serif;
            font-size: 48px;
            font-weight: 900;
            line-height: 1.25;
            color: #f0fdf8;
        }

        .layout-market .body-description {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            line-height: 1.65;
            color: #9ca3af;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(16,185,129,0.12);
            border-radius: 12px;
            padding: 22px 26px;
        }

        .layout-market .footer-meta {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(16,185,129,0.55);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 18px;
            text-align: center;
        }


        /* ================================================================
           LAYOUT-HEALTH  |  Sports & Entertainment
           Bold full-bleed photo with a premium frosted purple/neutral
           glass card at the bottom. Elegant Playfair italic category label.
           ================================================================ */
        .layout-health .gradient-overlay {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 60%;
            background: linear-gradient(to bottom,
                rgba(10,5,20,0) 0%,
                rgba(15,8,28,0.75) 35%,
                rgba(15,8,28,0.97) 100%);
            z-index: 3;
        }

        .layout-health .dot-matrix-top { top: 55px; right: 55px; }

        .layout-health .glass-content-card {
            position: absolute;
            bottom: 55px; left: 55px; right: 55px;
            background: rgba(18, 10, 32, 0.58);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(191,90,242,0.2);
            border-top: 2px solid rgba(191,90,242,0.45);
            border-radius: 28px;
            padding: 46px 52px 42px;
            z-index: 10;
            box-shadow: 0 30px 70px rgba(0,0,0,0.65), 0 0 50px rgba(191,90,242,0.07), inset 0 1px 1px rgba(255,255,255,0.06);
        }

        .layout-health .category-badge {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 26px;
            color: #bf5af2;
            margin-bottom: 18px;
            display: block;
            letter-spacing: 0.5px;
        }

        .layout-health .headline-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 54px;
            font-weight: 900;
            line-height: 1.2;
            color: #f0e8ff;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        .layout-health .body-description {
            font-family: 'Inter', sans-serif;
            font-size: 26px;
            line-height: 1.65;
            color: #c4b5d4;
            margin-bottom: 32px;
        }

        .layout-health .footer-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(191,90,242,0.18);
            padding-top: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
        }
        .layout-health .footer-meta span { color: #bf5af2; }

    </style>
</head>

<body>
    <div class="master-canvas layout-news">

        <div class="bg-scraped-photo"></div>
        <div class="gradient-overlay"></div>

        <div class="dot-matrix dot-matrix-top"></div>
        <div class="dot-matrix dot-matrix-bottom"></div>

        <svg class="wavy-accent-line" viewBox="0 0 1080 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,100 C300,180 700,30 1080,120 L1080,200 L0,200 Z" fill="rgba(255,255,255,0.025)" />
            <path d="M0,110 Q450,50 1080,140" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" fill="none" />
        </svg>

        <!-- Glass Logo Pill (shown on all layouts) -->
        <div class="logo-glass-pill">
            <img src="../../assets/logo.png" alt="Nepal Central News">
        </div>

        <!-- Glass Content Card (replaces old content-wrapper) -->
        <div class="glass-content-card">
            <div class="category-badge">{CATEGORY_BADGE}</div>
            <div class="headline-title">{HEADLINE_TITLE}</div>
            <div class="body-description">{BODY_DESCRIPTION}</div>
            <div class="footer-meta">
                <span>NEPAL CENTRAL NEWS</span>
                <span style="color:rgba(255,255,255,0.25);font-size:14px;letter-spacing:1px;">ncn.com.np</span>
            </div>
        </div>

    </div>
</body>

</html>
